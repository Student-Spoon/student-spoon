<!DOCTYPE html>
<html lang="en">
<head>
<!-- Basic responsive page setup -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Spoon | Reviews</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>
<header>
<!-- Shared navigation between all pages -->
<nav class="navbar">
<h1 class="logo">Student Spoon</h1>
<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="recipes.html">Recipes</a></li>
<li><a href="upload.html">Upload</a></li>
<li><a href="reviews.html">Reviews</a></li>
</ul>
</nav>
</header>
<section class="hero">
<h2>Student Reviews</h2>
<p>See what other students think about the recipes.</p>
</section>
<!-- Existing review cards -->
<section class="recipes">
<div class="card">
<h3>Aisha</h3>
<p>⭐ 5/5</p>
<p><strong>Budget Pasta</strong></p>
<p>Budget Pasta was cheap and easy.</p>
</div>
<div class="card">
<h3>James</h3>
<p>⭐ 4/5</p>
<p><strong>Chicken Rice Bowl</strong></p>
<p>Chicken Rice Bowl tasted great.</p>
</div>
</section>
<!-- Review submission form -->
<section class="hero">
<h2>Leave a Review</h2>
<form id="reviewForm">
<input type="text" id="reviewName" placeholder="Your Name">
<input type="text" id="reviewRecipe" placeholder="Recipe Name">
<textarea id="reviewText" placeholder="Write your review"></textarea>
<button type="submit">Submit Review</button>
</form>
<!-- Review success/error messages appear here -->
<p id="reviewMessage"></p>
</section>
<!-- New submitted reviews appear here without reloading the page -->
<section class="recipes" id="newReviews"></section>
<footer>
<p>Student Spoon © 2026</p>
</footer>
</body>
</html>
