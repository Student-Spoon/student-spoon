<!DOCTYPE html>
<html lang="en">
<head>
<!-- Basic responsive page setup -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Spoon | Upload Recipe</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>
<header>
<!-- Shared navigation between all pages -->
<nav class="navbar">
<h1 class="logo">Student Spoon</h1>
<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="recipes.html">Recipes</a></li>
<li><a href="upload.html">Upload</a></li>
<li><a href="reviews.html">Reviews</a></li>
</ul>
</nav>
</header>
<section class="hero">
<h2>Upload Your Recipe</h2>
<p>Share a cheap and easy meal with other students.</p>
<!-- Upload form validated and updated using JavaScript -->
<form id="recipeForm">
<input type="text" id="recipeName" placeholder="Recipe Name">
<textarea id="ingredients" placeholder="Ingredients"></textarea>
<textarea id="instructions" placeholder="Instructions"></textarea>
<input type="text" id="cost" placeholder="Estimated Cost">
<button type="submit">Submit Recipe</button>
</form>
<!-- Form success/error messages appear here -->
<p id="formMessage"></p>
</section>
<!-- New submitted recipes appear here without reloading the page -->
<section class="recipes" id="uploadedRecipes"></section>
<footer>
<p>Student Spoon © 2026</p>
</footer>
</body>
</html>
